<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="panda">
<div class="ear ear-l"></div>
<div class="ear ear-r"></div>
<div class="face">
<div class="eye eye-l"><div class="eyeball-l"></div></div>
<div class="eye eye-r"><div class="eyeball-r"></div></div>
<div class="blush-l"></div>
<div class="blush-r"></div>
<div class="nose"></div>
</div>
<div class="hand hand-l"></div>
<div class="hand hand-r"></div>
</div>

<div class="login-box">
<label>Facebook Login</label>
<button id="facebookLogin">CONTINUE WITH FACEBOOK</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
